name: update-nlboot-client

# Triggered manually when a new nlboot-client release is published.
# Provide the version (without leading 'v'), download the release tarballs,
# compute sha256 checksums, update the formula, and open a pull request.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "nlboot-client release version, without leading v (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Download artifacts and compute sha256
        id: hashes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          BASE="https://github.com/SociOS-Linux/nlboot/releases/download/nlboot-client-v${VERSION}"
          X86_URL="${BASE}/nlboot-client-nlboot-client-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          ARM_URL="${BASE}/nlboot-client-nlboot-client-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"

          echo "Fetching x86_64 artifact..."
          curl -fsSL --retry 3 -o /tmp/nlboot-x86.tar.gz "${X86_URL}"
          X86_SHA=$(sha256sum /tmp/nlboot-x86.tar.gz | awk '{print $1}')

          echo "Fetching aarch64 artifact..."
          curl -fsSL --retry 3 -o /tmp/nlboot-arm.tar.gz "${ARM_URL}"
          ARM_SHA=$(sha256sum /tmp/nlboot-arm.tar.gz | awk '{print $1}')

          echo "x86_sha=${X86_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_url=${X86_URL}" >> "$GITHUB_OUTPUT"
          echo "arm_url=${ARM_URL}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ inputs.version }}
          X86_SHA: ${{ steps.hashes.outputs.x86_sha }}
          ARM_SHA: ${{ steps.hashes.outputs.arm_sha }}
          X86_URL: ${{ steps.hashes.outputs.x86_url }}
          ARM_URL: ${{ steps.hashes.outputs.arm_url }}
        run: |
          python3 tools/update_nlboot_client.py \
            "${VERSION}" \
            "${X86_URL}" "${X86_SHA}" \
            "${ARM_URL}" "${ARM_SHA}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "nlboot-client: update to v${{ inputs.version }}"
          title: "nlboot-client: update to v${{ inputs.version }}"
          body: |
            Automated formula update for **nlboot-client v${{ inputs.version }}**.

            - Updated x86_64 and aarch64 release artifact URLs.
            - Replaced sha256 placeholders with computed checksums.
            - Source release: https://github.com/SociOS-Linux/nlboot/releases/tag/nlboot-client-v${{ inputs.version }}

            **Validation:** Run `make validate` (i.e. `python3 tools/validate_formulae.py`) locally to confirm the formula passes structural checks.  On a Linux host with Homebrew, `brew audit --strict Formula/nlboot-client.rb` provides additional Homebrew-level validation.
          branch: "update/nlboot-client-v${{ inputs.version }}"
          base: main
          labels: "formula-update,nlboot-client"
